vault_extra.landing:
  path: '/vault/welcome'
  defaults:
    _controller: '\Drupal\vault_extra\Controller\LandingController::view'
    _title: 'Secure File Vault'
  requirements:
    _access: 'TRUE'

entity.vault_plan.collection:
  path: '/admin/config/vault/plans'
  defaults:
    _entity_list: 'vault_plan'
    _title: 'Vault Plans'
  requirements:
    _permission: 'administer vault plans'

entity.vault_plan.add_form:
  path: '/admin/config/vault/plans/add'
  defaults:
    _entity_form: 'vault_plan.add'
    _title: 'Add plan'
  requirements:
    _permission: 'administer vault plans'

entity.vault_plan.edit_form:
  path: '/admin/config/vault/plans/{vault_plan}'
  defaults:
    _entity_form: 'vault_plan.edit'
    _title: 'Edit plan'
  requirements:
    _permission: 'administer vault plans'

entity.vault_plan.delete_form:
  path: '/admin/config/vault/plans/{vault_plan}/delete'
  defaults:
    _entity_form: 'vault_plan.delete'
    _title: 'Delete plan'
  requirements:
    _permission: 'administer vault plans'

vault_extra.favorites:
  path: '/vault/favorites'
  defaults:
    _controller: '\Drupal\vault_extra\Controller\FavoritesController::list'
    _title: 'My Favorites'
  requirements:
    _permission: 'access vault favorites page'

vault_extra.shared_with_me:
  path: '/vault/shared-with-me'
  defaults:
    _controller: '\Drupal\vault_extra\Controller\SharedWithMeController::list'
    _title: 'Shared with Me'
  requirements:
    _permission: 'access vault shared page'

vault_extra.favorite_toggle:
  path: '/vault/favorite/{node}/toggle'
  defaults:
    _controller: '\Drupal\vault_extra\Controller\FavoriteToggleController::toggle'
  requirements:
    _permission: 'access vault favorites page'
    _csrf_token: 'true'
  options:
    parameters:
      node:
        type: entity:node

vault_extra.share_form:
  path: '/vault/share/{node}'
  defaults:
    _form: '\Drupal\vault_extra\Form\ShareFileForm'
    _title: 'Share file'
  requirements:
    _permission: 'use vault file sharing'
    _custom_access: '\Drupal\vault_extra\Access\VaultShareAccessCheck::access'
  options:
    parameters:
      node:
        type: entity:node

vault_extra.share_revoke:
  path: '/vault/share/{node}/revoke/{shared_uid}'
  defaults:
    _controller: '\Drupal\vault_extra\Controller\ShareRevokeController::revoke'
  requirements:
    _permission: 'use vault file sharing'
    _custom_access: '\Drupal\vault_extra\Access\VaultShareAccessCheck::access'
    shared_uid: '\d+'
    _csrf_token: 'true'
  options:
    parameters:
      node:
        type: entity:node
